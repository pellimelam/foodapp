<!-- REGISTER FUNCTION -->

<script type="module">

import { initRouter } from "./utilities/router.js"
import { checkRepo, createRepo, createUserSite } from "./utilities/github.js";

window.registerUser = async function(){

const state = document.getElementById("state").value;
const district = document.getElementById("district").value;
const subdistrict = document.getElementById("subdistrict").value;
const village = document.getElementById("village").value;

const firstName = document.getElementById("firstName").value.trim();
const lastName = document.getElementById("lastName").value.trim();
const phone = document.getElementById("phone").value.trim();
const profession = document.getElementById("profession").value;

/* VALIDATION */

if(!state || !district || !subdistrict || !village){
alert("Please select complete location");
return;
}

if(!firstName || !lastName || !phone || !profession){
alert("Please fill all details");
return;
}

if(!/^[6-9][0-9]{9}$/.test(phone)){
alert("Enter valid mobile number");
return;
}

/* CHECK */

const resultEl = document.getElementById("result");

resultEl.innerHTML = "Checking...";

const exists = await checkRepo(phone);

if(exists){
resultEl.innerHTML = `
<div style="color:#ef4444;margin-top:10px;">
❌ Profile already exists with this phone number.<br>
Contact via WhatsApp (bottom right).
</div>
`;
return;
}

/* =========================
   🔒 STRICT PAYMENT CONTROL
========================= */

resultEl.innerHTML = "Opening payment...";

let paymentDone = false;

const rzp = new Razorpay({
  key: "rzp_live_SO4F7YCOOnRVRZ",
  amount: 100,
  currency: "INR",
  name: "Vidhwaan",
  description: "Profile Registration",

  handler: async function(response){

    // 🔒 ENSURE THIS RUNS ONLY ON REAL PAYMENT
    if(paymentDone) return;

    if(!response || !response.razorpay_payment_id){
      resultEl.innerHTML = `
      <div style="color:#ef4444;margin-top:10px;">
      ❌ Payment verification failed. Please try again.
      </div>`;
      return;
    }

    paymentDone = true;

    /* =========================
       ORIGINAL CREATE FLOW (UNCHANGED)
    ========================= */

    resultEl.innerHTML = "Creating profile...";

    const status = await createRepo(phone);

    if(status !== "created"){
    resultEl.innerHTML = `
    <div style="color:#ef4444;margin-top:10px;">
    ❌ Error creating profile. Please try again.
    </div>
    `;
    return;
    }

    const data = {
      version: 1,
      firstName,
      lastName,
      phone,
      profession,
      location:{
        state,
        district,
        subdistrict,
        village
      },
      gallery: [],
      videos: [],
    };

    await createUserSite({
    ...data,
    village
    });

    const slug = `${firstName}${lastName}${phone}`.toLowerCase();

    function slugify(str){
    return str.toLowerCase().replace(/\s+/g,"-");
    }

    const geoPath = `
    ${slugify(state)}/
    ${slugify(district)}/
    ${slugify(subdistrict)}/
    ${slugify(village)}/
    ${slugify(profession)}/
    ${slug}
    `.replace(/\n/g,"");

    const url = `https://app.vidhwaan.com/${slug}`;

    document.getElementById("result").innerHTML = `
    <div style="
    padding:16px;
    border-radius:10px;
    margin-top:15px;
    text-align:center;
    background:rgba(255,255,255,0.03);
    ">

    <h3 style="margin-bottom:10px;color:#22c55e;">
    ✅ Profile Created Successfully
    </h3>

    <p style="color:#94a3b8;font-size:14px;margin-bottom:10px;">
    Save or open your profile link
    </p>

    <a href="${url}" target="_blank"
    style="
    display:block;
    word-break:break-all;
    color:#60a5fa;
    text-decoration:none;
    font-size:13px;
    margin-bottom:12px;
    ">
    ${url}
    </a>

    <button onclick="navigator.clipboard.writeText('${url}')"
    style="
    background:#2563eb;
    color:white;
    padding:10px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    ">
    Copy URL
    </button>

    </div>
    `;

    alert("Profile created 🚀");
  },

  modal:{
    ondismiss: function(){
      paymentDone = false;

      resultEl.innerHTML = `
      <div style="color:#94a3b8;margin-top:10px;">
      Payment cancelled. Please try again.
      </div>
      `;
    }
  }
});

rzp.open();
}
</script>


<!-- OPTIONAL CARD HOVER EFFECT -->
<script>

document.addEventListener("mousemove", (e) => {

document.querySelectorAll(".card").forEach(card => {

const rect = card.getBoundingClientRect();

const x = e.clientX - rect.left;
const y = e.clientY - rect.top;

card.style.setProperty("--x", x + "px");
card.style.setProperty("--y", y + "px");

});

});

</script>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
