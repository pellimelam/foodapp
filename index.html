<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Food App</title>

<link rel="stylesheet" href="./css/design-system.css">
<link rel="stylesheet" href="./css/main.css">

</head>

<body>

<!-- NAVBAR -->

<div class="nav">

  <div class="logo" style="display:flex;align-items:center;gap:10px;">
    <span style="font-weight:700;font-size:18px;color:white;">
      Food App
    </span>
  </div>

  <div class="nav-links">
    <a href="#">Menu</a>
    <a href="#">Offers</a>
    <a href="#">Contact</a>
  </div>

</div>

<!-- MAIN CONTAINER -->

<div class="container">

  <!-- SLIDER -->

  <div class="card" style="padding:0;overflow:hidden;margin-bottom:15px;">
    <div class="slider" id="slider">
      <div class="slides" id="slides"></div>
      <div class="dots" id="dots"></div>
    </div>
  </div>

  <!-- SEARCH -->

  <div class="card" style="padding:12px;margin-bottom:15px;">
    <input
      id="search"
      placeholder="Search food..."
      style="
        width:100%;
        height:44px;
        border-radius:12px;
        border:1px solid rgba(148,163,184,0.2);
        background:rgba(255,255,255,0.05);
        color:white;
        padding:0 14px;
        outline:none;
      "
    />
  </div>

  <!-- CATEGORIES -->

  <div class="card" style="padding:10px;margin-bottom:15px;">
    <div id="categories" style="display:flex;gap:12px;overflow-x:auto;"></div>
  </div>

  <!-- ITEMS -->

  <div id="items"></div>

</div>

<!-- CART -->

<div id="cartBar" style="
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#020617;
  padding:12px;
  display:none;
  z-index:999;
">
  <div style="display:flex;justify-content:space-between;">
    <div>
      <div id="total">₹0</div>
      <div id="count">0 items</div>
    </div>

```
<button id="orderBtn" style="
  background:#facc15;
  padding:10px 16px;
  border:none;
  border-radius:999px;
  font-weight:600;
">
  Order
</button>
```

  </div>
</div>

<script src="./app.js"></script>

</body>
</html>
